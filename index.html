<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spells Archive</title>
    <link rel="icon" type="image/x-icon" href="img/spellbook.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amarante&family=Viaoda+Libre&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Spells Archive</h1>
        <div id="search-container">
            <label for="search-input">Search for Spell name or Level</label>
            <input type="search" id="search-input" placeholder="Search the Archive...">
        </div>
    </header>

    <main id="spell-page-content">
        <div class="hidden" id="loading-wizard-gif-container">
            <img id="loading-wizard-gif" src="img/animated-gifs-wizards.gif" alt="wizard casting spell">
            <p id="loading-text">Summoning Spells</p>
        </div>
    </main>

    <button id="up-button" title="Go to top">
        <i class="fa fa-hand-o-up" aria-hidden="true"></i>
    </button>

    <script src="dist/index.js" type="module"></script>
</body>
</html>
