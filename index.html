<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spells Archive</title>
    <link rel="icon" type="image/x-icon" href="/Spells-Archive/assets/spellbook-Cru9_XYp.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amarante&family=Viaoda+Libre&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/Spells-Archive/assets/main-BxPLqvan.js"></script>
  <link rel="modulepreload" crossorigin href="/Spells-Archive/assets/api-1J5r5zns.js">
  <link rel="stylesheet" crossorigin href="/Spells-Archive/assets/api-BGE1U4Wr.css">
</head>
<body>

    <header>
        <h1>Spells Archive</h1>
        <div id="search-container">
            <input type="search" id="search-input" placeholder="Search the Archive...">
            <select id="level-filter">
                <option value="all">All Levels</option>
                <option value="0" class="level-option">Cantrip</option>
                <option value="1">Level 1</option>
                <option value="2">Level 2</option>
                <option value="3">Level 3</option>
                <option value="4">Level 4</option>
                <option value="5">Level 5</option>
                <option value="6">Level 6</option>
                <option value="7">Level 7</option>
                <option value="8">Level 8</option>
                <option value="9">Level 9</option>
            </select>
        </div>
    </header>

    <main id="spell-page-content">
        <div class="hidden" id="loading-wizard-gif-container">
            <img id="loading-wizard-gif" src="/Spells-Archive/assets/animated-gifs-wizards-7l9jsU2b.gif" alt="wizard casting spell">
            <p id="loading-text">Summoning Spells</p>
        </div>
    </main>

    <button id="up-button" title="Go to top">
        <i class="fa fa-hand-o-up" aria-hidden="true"></i>
    </button>

</body>
</html>
