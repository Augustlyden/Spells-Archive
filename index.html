<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spells Archive</title>
    <link rel="icon" type="image/x-icon" href="img/spellbook.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Spells Archive</h1>
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Search the Archive...">
            <button id="search-button">Search</button>
            <div id="dropdown">
                <button id="dropdown-button">Level</button>
                <div id="dropdown-content">
                    <a id="0" href="">0</a>
                    <a id="1" href="">1</a>
                    <a id="2" href="">2</a>
                    <a id="3" href="">3</a>
                    <a id="4" href="">4</a>
                    <a id="5" href="">5</a>
                    <a id="6" href="">6</a>
                    <a id="7" href="">7</a>
                    <a id="8" href="">8</a>
                    <a id="9" href="">9</a>
                </div>
            </div>
        </div>
    </header>

    <main id="spell-page-content">
        <div class="hidden" id="loading-wizard-gif-container">
            <img id="loading-wizard-gif" src="img/animated-gifs-wizards.gif" alt="wizard casting spell">
            <p id="loading-text">Loading Spells</p>
        </div>
        <!-- Spells will be displayed here dynamically -->
        <!-- <a href="spell.html">
            <article class="spell-container">
                <h2></h2>
                <p></p> 
            </article>
        </a> -->
    </main>

    <script src="dist/index.js" type="module"></script>
</body>
</html>
