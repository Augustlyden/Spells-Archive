name: Deploy to Github Pages

on: 
    push:
        branches: ["main"]

permissions:
    contents: write

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '24'
            
            - name: Install dependencies
              run: npm install

            - name: Build project
              run: |
                npm run build 

            - name: Deploy to Github Pages
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                folder: dist
                branch: gh-pages
                force: true
                clean: true
                git-config-name: github-actions[bot]
                git-config-email: github-actions[bot]@://github.com